name: Cortex-RTOS CI

on:
    push:
        branches: ["main", "dev", "feature/**"]
    pull_request:
        branches: ["main", "dev"]

jobs:
    build:
        runs-on: ubuntu:latest
        steps:
        - name: Checkout code
          uses: actions/checkout@v4
        
        - name: Build Docker Image
          run: docker build -t cortex-rtos-ci .
        
        - name: Compile Kernel
          run: docker run --rm -v ${{github.workspace}}:/project cortex-rtos-ci make clean all



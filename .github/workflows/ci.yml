name: Cortex-RTOS CI

on:
    push:
        branches: ["main", "dev", "feature/**"]
    pull_request:
        branches: ["main", "dev"]

jobs:
    build:
        runs-on: self-hosted
        timeout-minutes: 10
        steps:
        - name: Checkout code
          uses: actions/checkout@v4
        
        - name: Build Docker Image
          run: docker build -t cortex-rtos-ci .
        
        - name: Compile Kernel
          run: docker run --rm -u $(id -u):$(id -g) -v ${{github.workspace}}:/project cortex-rtos-ci


